# ci-train — local-mode Compose.
#
# Targets:
#   • single-developer laptop, OR
#   • LAN beta on a dedicated local machine (instructors + trainees on
#     the same network).
#
# What's in this stack:
#   • db   — Postgres 16
#   • api  — NestJS, served on $API_PORT
#   • web  — Next.js, served on $WEB_PORT
#
# Use the LAN-beta env file (deploy/env/local.env.example) for either
# scenario; the difference between the two modes is just how you bind
# the web/api ports (loopback vs 0.0.0.0) and whether you put Caddy in
# front. See docs/deployment.md.
#
# Usage (from repo root):
#   docker compose --env-file deploy/env/local.env \
#                  -f deploy/docker-compose.local.yml \
#                  up --build
#
# All app-level config (URLs, CORS origins, storage roots, DB URL)
# comes from env vars — no hardcoded domains.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-citrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citrain_dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-citrain}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    expose:
      - "5432"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER:-citrain}:${POSTGRES_PASSWORD:-citrain_dev_password_change_me}@db:5432/${POSTGRES_DB:-citrain}
      ARTIFACT_STORAGE_ROOT: /data/artifacts
      # Local mode does not sit behind a sanitizing proxy. Leave OFF.
      TRUST_PROXY: ${TRUST_PROXY:-false}
      # Optional in local mode; when set, must match the web service
      # so the BFF-forwarded-IP throttler can validate the secret.
      BFF_FORWARD_SECRET: ${BFF_FORWARD_SECRET:-}
      # M15 seed accounts. Passwords optional in local mode: leave
      # blank → random passwords printed by the seed on first run.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-${SEED_INSTRUCTOR_EMAIL:-instructor@example.local}}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-${SEED_TRAINEE_EMAIL:-trainee@example.local}}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-}
      SEED_INSTRUCTOR_EMAIL: ${SEED_INSTRUCTOR_EMAIL:-}
      SEED_TRAINEE_EMAIL: ${SEED_TRAINEE_EMAIL:-}
    volumes:
      # Named volume so artifacts survive container recreation. Override
      # to a host bind mount via deploy/env/local.env if you want the
      # bytes browsable on the host filesystem.
      - artifacts:/data/artifacts
    ports:
      # ${API_BIND_HOST:-0.0.0.0} so a developer can pin to 127.0.0.1
      # (laptop) or leave wide-open (LAN beta).
      - "${API_BIND_HOST:-0.0.0.0}:${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/v1/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WEB_PORT:-3000}
      HOSTNAME: 0.0.0.0
      # Inside the compose network, the web service reaches the api by
      # its service name — not a public URL. Env-driven so an override
      # can point at a remote api if the operator wants to host them
      # separately.
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:4000}
      # Optional in local mode; must match the api service when set.
      BFF_FORWARD_SECRET: ${BFF_FORWARD_SECRET:-}
    ports:
      - "${WEB_BIND_HOST:-0.0.0.0}:${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  db-data:
  artifacts:
